<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>USD/JPY Chart</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #111;
    }
    #chart {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div id="chart"></div>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<script>
  const container = document.getElementById('chart');

  const chart = LightweightCharts.createChart(container, {
    width: container.clientWidth,
    height: container.clientHeight,
    layout: {
      background: { color: '#111' },
      textColor: '#DDD',
    },
    timeScale: {
      timeVisible: true,
      secondsVisible: false,
    },
  });

  const series = chart.addLineSeries({
    color: '#26a69a',
    lineWidth: 2,
  });

  // テスト用の静的データ
  series.setData([
    { time: '2024-04-01', value: 151.2 },
    { time: '2024-04-02', value: 151.8 },
    { time: '2024-04-03', value: 152.1 },
    { time: '2024-04-04', value: 152.5 },
    { time: '2024-04-05', value: 152.9 },
  ]);

  window.addEventListener('resize', () => {
    chart.applyOptions({
      width: container.clientWidth,
      height: container.clientHeight,
    });
  });
</script>

</body>
</html>
