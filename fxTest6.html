<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>USD/JPY Real Chart</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #111;
    }
    #chart {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div id="chart"></div>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<script>
  const container = document.getElementById('chart');

  const chart = LightweightCharts.createChart(container, {
    width: container.clientWidth,
    height: container.clientHeight,
    layout: {
      background: { color: '#111' },
      textColor: '#DDD',
    },
    timeScale: {
      timeVisible: true,
      secondsVisible: false,
    },
  });

  const candleSeries = chart.addCandlestickSeries();

  async function loadUSDJPY() {
    const url = "https://query1.finance.yahoo.com/v8/finance/chart/USDJPY=X?interval=1m&range=1d";

    const res = await fetch(url);
    const json = await res.json();

    const result = json.chart.result[0];
    const timestamps = result.timestamp;
    const o = result.indicators.quote[0].open;
    const h = result.indicators.quote[0].high;
    const l = result.indicators.quote[0].low;
    const c = result.indicators.quote[0].close;

    const data = timestamps.map((t, i) => ({
      time: t,
      open: o[i],
      high: h[i],
      low: l[i],
      close: c[i],
    }));

    candleSeries.setData(data);
  }

  loadUSDJPY();
  setInterval(loadUSDJPY, 60000); // 1分ごと更新

  window.addEventListener('resize', () => {
    chart.applyOptions({
      width: container.clientWidth,
      height: container.clientHeight,
    });
  });
</script>

</body>
</html>
